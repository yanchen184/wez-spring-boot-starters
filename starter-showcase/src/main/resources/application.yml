server:
  port: 8080

spring:
  application:
    name: starter-showcase

  # H2 — JPA demo 用
  datasource:
    url: jdbc:h2:mem:showcase;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  # Redis（Embedded Redis 自動啟動，無需外部安裝）
  data:
    redis:
      host: localhost
      port: 6370

# Actuator + Observability
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus, caches, mappings, env, loggers, beans
  endpoint:
    health:
      show-details: always
      show-components: always
  metrics:
    distribution:
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
      minimum-expected-value:
        http.server.requests: 1ms
      maximum-expected-value:
        http.server.requests: 10s
  info:
    env:
      enabled: true

info:
  app:
    name: Starter Showcase
    version: 1.0.0
    description: Spring Boot Starter Demo

# Common Log Starter
common:
  log:
    enabled: true
    slow-threshold-ms: 3000
    mask-fields:
      - password
      - secret
      - token
